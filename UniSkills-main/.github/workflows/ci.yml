name: 🚀 UniSkills CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── JOB 1: BACKEND TESTS ─────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend API Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: uniskills_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Backend Dependencies
        run: npm install

      - name: ⏳ Wait for MySQL to be Ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -proot123 --silent; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... attempt $i"
            sleep 2
          done

      - name: 🔐 Create .env for Test Environment
        run: |
          echo "PORT=8080" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_USER=root" >> .env
          echo "DB_PASS=root123" >> .env
          echo "DB_NAME=uniskills_db" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}" >> .env
          echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}" >> .env
          echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}" >> .env
          echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env
          echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env

      - name: 🔥 Create Firebase Service Account for Tests
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p config
          echo "$FIREBASE_SA" > config/firebaseServiceAccount.json

      - name: 🧪 Run Backend API Tests
        run: npm test

  # ─── JOB 2: FRONTEND BUILD CHECK ──────────────────────────────────────────
  build-frontend:
    name: 🏗️ Frontend Build Check
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Frontend Dependencies
        run: npm install
        working-directory: ./frontend

      - name: 🔑 Create Frontend Firebase Config
        run: |
          cat > src/firebase.js << 'EOF'
          import { initializeApp } from "firebase/app";
          import { getFirestore } from "firebase/firestore";
          const firebaseConfig = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "uniskills-96225.firebaseapp.com",
            projectId: "uniskills-96225",
            storageBucket: "uniskills-96225.firebasestorage.app",
            messagingSenderId: "395762323190",
            appId: "1:395762323190:web:a001b792eafb63756aa6d7"
          };
          const app = initializeApp(firebaseConfig);
          export const db = getFirestore(app);
          EOF
        working-directory: ./frontend

      - name: 🏗️ Build Frontend (Vite)
        run: npm run build
        working-directory: ./frontend

      - name: ✅ Build Successful!
        run: echo "Frontend built successfully! Ready for deployment."
